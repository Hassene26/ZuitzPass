[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "./" }]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    # Rarimo SDK (vendored under src/rarimo) needs the upgradeable OZ package:
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/",
    # Fixture-generator deps (install separately — see test/fixtures/README.md):
    "@solarity/solidity-lib/=lib/solidity-lib/contracts/",
    "poseidon-solidity/=lib/poseidon-solidity/contracts/",
]
