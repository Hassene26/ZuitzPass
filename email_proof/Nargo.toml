[package]
name = "email_proof"
type = "bin"
authors = ["Zuitzerland"]

# ⚠️ TOOLCHAIN: this package builds with nargo 1.0.0-beta.5 (zkemail.nr v2.0.0's pinned
# toolchain — its dep tree does not compile on newer nargo). Use `noirup -v 1.0.0-beta.5`
# + the matching bb for THIS package only; eligibility_proof/ and issuance_proof/ keep the
# repo's newer toolchain. poseidon is pinned to v0.1.0 for the same reason — identical
# Poseidon parameters/outputs as v0.3.0, only compiler compatibility differs (cross-checked
# against demo-app/backend/poseidon.js).
[dependencies]
poseidon = { tag = "v0.1.0", git = "https://github.com/noir-lang/poseidon" }
zkemail = { tag = "v2.0.0", git = "https://github.com/zkemail/zkemail.nr", directory = "lib" }
